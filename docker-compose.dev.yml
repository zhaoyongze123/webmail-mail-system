name: webmail-mail-system-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webmail}
      POSTGRES_USER: ${POSTGRES_USER:-webmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webmail_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://webmail:webmail_dev_password@postgres:5432/webmail}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:22-bookworm
    working_dir: /app
    env_file:
      - .env.example
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://backend:8000
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      NO_PROXY: "localhost,127.0.0.1,backend,postgres,redis"
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      no_proxy: "localhost,127.0.0.1,backend,postgres,redis"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c '
      LOCK_HASH=$$(sha256sum package-lock.json | awk "{print \$$1}");
      INSTALLED_HASH=$$(cat node_modules/.package-lock.hash 2>/dev/null || true);
      if [ ! -x node_modules/.bin/vite ] || [ "$$LOCK_HASH" != "$$INSTALLED_HASH" ]; then
        npm ci --include=dev &&
        mkdir -p node_modules &&
        printf "%s" "$$LOCK_HASH" > node_modules/.package-lock.hash;
      fi &&
      exec npm run dev -- --host 0.0.0.0 --port 5173'
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
