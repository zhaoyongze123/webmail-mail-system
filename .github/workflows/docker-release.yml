name: docker-release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GHCR_BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/webmail-mail-system/backend
  GHCR_FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/webmail-mail-system/frontend
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}

jobs:
  build-and-push:
    name: Build and push backend/frontend images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 检查 ACR secrets 是否齐全
        id: acr-check
        env:
          ACR_REGISTRY: ${{ env.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          registry="$(printf '%s' "${ACR_REGISTRY}" | tr -d '\r\n' | sed -E 's#^https?://##' | cut -d/ -f1)"
          if [ -n "${registry}" ] && [ -n "${ACR_USERNAME}" ] && [ -n "${ACR_PASSWORD}" ]; then
            echo "使用 ACR registry: ${registry}"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "registry=${registry}" >> "$GITHUB_OUTPUT"
            echo "backend_image=${registry}/webmail-mail-system/backend" >> "$GITHUB_OUTPUT"
            echo "frontend_image=${registry}/webmail-mail-system/frontend" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 登录阿里云 ACR
        if: steps.acr-check.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr-check.outputs.registry }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 生成 backend GHCR 镜像元数据
        id: backend-ghcr-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 生成 frontend GHCR 镜像元数据
        id: frontend-ghcr-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 生成 backend ACR 镜像元数据
        if: steps.acr-check.outputs.enabled == 'true'
        id: backend-acr-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.acr-check.outputs.backend_image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 生成 frontend ACR 镜像元数据
        if: steps.acr-check.outputs.enabled == 'true'
        id: frontend-acr-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.acr-check.outputs.frontend_image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 构建并推送 backend 镜像到 GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.backend-ghcr-meta.outputs.tags }}
          labels: ${{ steps.backend-ghcr-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 构建并推送 frontend 镜像到 GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.frontend-ghcr-meta.outputs.tags }}
          labels: ${{ steps.frontend-ghcr-meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: 构建并推送 backend 镜像到 ACR
        if: steps.acr-check.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.backend-acr-meta.outputs.tags }}
          labels: ${{ steps.backend-acr-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 构建并推送 frontend 镜像到 ACR
        if: steps.acr-check.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.frontend-acr-meta.outputs.tags }}
          labels: ${{ steps.frontend-acr-meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
