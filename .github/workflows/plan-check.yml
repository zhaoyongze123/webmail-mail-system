name: pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
  workflow_dispatch:

jobs:
  validate-plan:
    name: Validate plan status
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 执行计划校验
        run: python3 scripts/plan_status.py validate

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 安装后端依赖
        run: pip install -r backend/requirements.txt

      - name: 执行后端测试
        working-directory: backend
        run: python -m pytest tests -q

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: 安装 Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: 执行前端单元测试
        working-directory: frontend
        run: npm test

      - name: 执行前端构建
        working-directory: frontend
        run: npm run build

      - name: 执行前端 E2E
        working-directory: frontend
        run: npm run test:e2e

  compose-check:
    name: Docker Compose config
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验 Compose 配置
        run: docker compose config

  whitespace-check:
    name: Whitespace check
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 检查 Git diff 空白
        run: git diff --check HEAD~1 HEAD

  publish-images:
    name: Publish images
    runs-on: ubuntu-latest
    needs:
      - validate-plan
      - backend-tests
      - frontend-tests
      - compose-check
      - whitespace-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    env:
      GHCR_BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/webmail-mail-system/backend
      GHCR_FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/webmail-mail-system/frontend
      ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 检查是否启用 ACR 发布
        id: acr-enabled
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          if [ -n "${ACR_REGISTRY}" ] && [ -n "${ACR_USERNAME}" ] && [ -n "${ACR_PASSWORD}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 规范化 ACR registry
        id: acr-check
        if: steps.acr-enabled.outputs.enabled == 'true'
        run: |
          registry="$(printf '%s' "${ACR_REGISTRY}" | tr -d '\r\n' | sed -E 's#^https?://##' | cut -d/ -f1)"
          if [ -z "${registry}" ]; then
            echo "ACR_REGISTRY 未配置或为空" >&2
            exit 1
          fi
          echo "使用 ACR registry: ${registry}"
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${registry}/yuncan/webmail-mail-system-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${registry}/yuncan/webmail-mail-system-frontend" >> "$GITHUB_OUTPUT"

      - name: 登录阿里云 ACR
        if: steps.acr-enabled.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr-check.outputs.registry }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 生成 backend GHCR 镜像元数据
        id: backend-ghcr-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 生成 frontend GHCR 镜像元数据
        id: frontend-ghcr-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 生成 backend ACR 镜像元数据
        id: backend-acr-meta
        if: steps.acr-enabled.outputs.enabled == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.acr-check.outputs.backend_image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 生成 frontend ACR 镜像元数据
        id: frontend-acr-meta
        if: steps.acr-enabled.outputs.enabled == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.acr-check.outputs.frontend_image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 构建并推送 backend 镜像到 GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.backend-ghcr-meta.outputs.tags }}
          labels: ${{ steps.backend-ghcr-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 构建并推送 frontend 镜像到 GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.frontend-ghcr-meta.outputs.tags }}
          labels: ${{ steps.frontend-ghcr-meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: 构建并推送 backend 镜像到 ACR
        if: steps.acr-enabled.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.backend-acr-meta.outputs.tags }}
          labels: ${{ steps.backend-acr-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 构建并推送 frontend 镜像到 ACR
        if: steps.acr-enabled.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.frontend-acr-meta.outputs.tags }}
          labels: ${{ steps.frontend-acr-meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - publish-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装部署依赖
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: 下发代码到服务器
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          test -n "${DEPLOY_HOST}" && test -n "${DEPLOY_USER}" && test -n "${DEPLOY_PASSWORD}" && test -n "${DEPLOY_PATH}"
          sshpass -p "${DEPLOY_PASSWORD}" ssh -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          tar czf - \
            backend \
            docker-compose.prod.yml \
            deploy \
            scripts/deploy_backend_host.sh \
          | sshpass -p "${DEPLOY_PASSWORD}" ssh -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" "tar xzf - -C '${DEPLOY_PATH}'"

      - name: 写入生产环境变量文件
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          WEBMAIL_ENV_PROD: ${{ secrets.WEBMAIL_ENV_PROD }}
        run: |
          test -n "${WEBMAIL_ENV_PROD}" || (echo "缺少 WEBMAIL_ENV_PROD secret" >&2; exit 1)
          printf '%s' "${WEBMAIL_ENV_PROD}" \
          | sshpass -p "${DEPLOY_PASSWORD}" ssh -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" "cat > '${DEPLOY_PATH}/.env.prod'"

      - name: 执行生产部署
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          test -n "${ACR_REGISTRY}" && test -n "${ACR_USERNAME}" && test -n "${ACR_PASSWORD}"
          sshpass -p "${DEPLOY_PASSWORD}" ssh -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" "set -euo pipefail && printf '%s' '${ACR_PASSWORD}' | docker login --username='${ACR_USERNAME}' --password-stdin '${ACR_REGISTRY}' && cd '${DEPLOY_PATH}' && chmod +x deploy/deploy_prod.sh scripts/deploy_backend_host.sh && ./scripts/deploy_backend_host.sh && ./deploy/deploy_prod.sh"

      - name: 最小部署验收
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          sshpass -p "${DEPLOY_PASSWORD}" ssh -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" "set -euo pipefail && cd '${DEPLOY_PATH}' && cmp -s .env.prod /opt/webmail/backend/.env.prod && test -f /var/vmail/vmail.db && docker volume inspect webmail-mail-system_postgres_data >/dev/null && docker volume inspect webmail-mail-system_redis_data >/dev/null && systemctl is-active webmail-backend.service postfix dovecot rspamd >/dev/null && docker compose --project-name webmail-mail-system --env-file .env.prod -f docker-compose.prod.yml ps && curl -fsS http://127.0.0.1:8000/api/health >/dev/null"
