name: ci

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

jobs:
  validate-plan:
    name: Validate plan status
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 执行计划校验
        run: python3 scripts/plan_status.py validate

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 安装后端依赖
        run: pip install -r backend/requirements.txt

      - name: 执行后端测试
        working-directory: backend
        run: python -m pytest tests -q

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: 安装 Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: 执行前端单元测试
        working-directory: frontend
        run: npm test

      - name: 执行前端构建
        working-directory: frontend
        run: npm run build

      - name: 执行前端 E2E
        working-directory: frontend
        run: npm run test:e2e

  compose-check:
    name: Docker Compose config
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验 Compose 配置
        run: docker compose config

  whitespace-check:
    name: Whitespace check
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查 Git diff 空白
        run: git diff --check HEAD~1 HEAD
