name: plan-check

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

jobs:
  validate-plan:
    name: Validate plan status
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 执行计划校验
        run: python3 scripts/plan_status.py validate
