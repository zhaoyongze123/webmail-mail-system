name: pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

jobs:
  validate-plan:
    name: Validate plan status
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 执行计划校验
        run: python3 scripts/plan_status.py validate

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 安装后端依赖
        run: pip install -r backend/requirements.txt

      - name: 执行后端测试
        working-directory: backend
        run: python -m pytest tests -q

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: 安装 Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: 执行前端单元测试
        working-directory: frontend
        run: npm test

      - name: 执行前端构建
        working-directory: frontend
        run: npm run build

      - name: 执行前端 E2E
        working-directory: frontend
        run: npm run test:e2e

  compose-check:
    name: Docker Compose config
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验 Compose 配置
        run: docker compose config

  whitespace-check:
    name: Whitespace check
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 检查 Git diff 空白
        run: git diff --check HEAD~1 HEAD

  publish-images:
    name: Publish images
    runs-on: ubuntu-latest
    needs:
      - validate-plan
      - backend-tests
      - frontend-tests
      - compose-check
      - whitespace-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    env:
      GHCR_BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/webmail-mail-system/backend
      GHCR_FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/webmail-mail-system/frontend
      ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 检查是否启用 ACR 发布
        id: acr-enabled
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          if [ -n "${ACR_REGISTRY}" ] && [ -n "${ACR_USERNAME}" ] && [ -n "${ACR_PASSWORD}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 规范化 ACR registry
        id: acr-check
        if: steps.acr-enabled.outputs.enabled == 'true'
        run: |
          registry="$(printf '%s' "${ACR_REGISTRY}" | tr -d '\r\n' | sed -E 's#^https?://##' | cut -d/ -f1)"
          if [ -z "${registry}" ]; then
            echo "ACR_REGISTRY 未配置或为空" >&2
            exit 1
          fi
          echo "使用 ACR registry: ${registry}"
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${registry}/yuncan/webmail-mail-system-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${registry}/yuncan/webmail-mail-system-frontend" >> "$GITHUB_OUTPUT"

      - name: 登录阿里云 ACR
        if: steps.acr-enabled.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr-check.outputs.registry }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 生成 backend GHCR 镜像元数据
        id: backend-ghcr-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 生成 frontend GHCR 镜像元数据
        id: frontend-ghcr-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 生成 backend ACR 镜像元数据
        id: backend-acr-meta
        if: steps.acr-enabled.outputs.enabled == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.acr-check.outputs.backend_image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 生成 frontend ACR 镜像元数据
        id: frontend-acr-meta
        if: steps.acr-enabled.outputs.enabled == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.acr-check.outputs.frontend_image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 构建并推送 backend 镜像到 GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.backend-ghcr-meta.outputs.tags }}
          labels: ${{ steps.backend-ghcr-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 构建并推送 frontend 镜像到 GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.frontend-ghcr-meta.outputs.tags }}
          labels: ${{ steps.frontend-ghcr-meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: 构建并推送 backend 镜像到 ACR
        if: steps.acr-enabled.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.backend-acr-meta.outputs.tags }}
          labels: ${{ steps.backend-acr-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 构建并推送 frontend 镜像到 ACR
        if: steps.acr-enabled.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.frontend-acr-meta.outputs.tags }}
          labels: ${{ steps.frontend-acr-meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
